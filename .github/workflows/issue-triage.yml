name: Issue Triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Label issues by content
        uses: github/issue-labeler@v3.4
        with:
          configuration-path: .github/issue-triage.yml
          enable-versioned-regex: 0
          include-title: 1
