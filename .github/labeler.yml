# Auto-labeler configuration for PR labeling based on changed files
# Used by actions/labeler@v5

# ── Core language ────────────────────────────────────────────────
interpreter:
  - changed-files:
      - any-glob-to-any-file: 'saurav.py'

compiler:
  - changed-files:
      - any-glob-to-any-file:
          - 'sauravcc.py'
          - 'sauravtranspile.py'

# ── Toolchain ────────────────────────────────────────────────────
tooling:
  - changed-files:
      - any-glob-to-any-file:
          - 'sauravlint.py'
          - 'sauravfmt.py'
          - 'sauravtype.py'
          - 'sauravci.py'
          - 'sauravcov.py'
          - 'sauravprof.py'
          - 'sauravmetrics.py'
          - 'sauravdeps.py'

debugger:
  - changed-files:
      - any-glob-to-any-file:
          - 'sauravdbg.py'
          - 'sauravtrace.py'

security:
  - changed-files:
      - any-glob-to-any-file:
          - 'sauravsec.py'
          - 'test_ssrf.py'

# ── Developer experience ────────────────────────────────────────
