          - 'sauravpkg.py'
          - 'sauravbundle.py'
          - 'sauravmin.py'
          - 'sauravobf.py'
          - 'sauravshare.py'
          - 'setup.py'
          - 'pyproject.toml'
          - 'Dockerfile'

# ── Learning & challenges ───────────────────────────────────────
