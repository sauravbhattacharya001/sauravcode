      - any-glob-to-any-file:
          - 'sauravgen.py'
          - 'sauravscaffold.py'
          - 'sauravdoc.py'

# ── Testing & fuzzing ───────────────────────────────────────────
tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'test_*.py'
          - 'test*.srv'
          - 'tests/**'
          - 'sauravtest.py'
          - 'sauravbench.py'
          - 'sauravfuzz.py'

# ── Examples & demos ────────────────────────────────────────────
examples:
  - changed-files:
      - any-glob-to-any-file:
          - '*.srv'
          - '!test*.srv'

# ── Documentation ───────────────────────────────────────────────
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'CONTRIBUTING.md'
          - 'CHANGELOG.md'
          - 'docs/**'
          - '*.md'

# ── CI/CD & infrastructure ──────────────────────────────────────
ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose*.yml'
          - '.dockerignore'


